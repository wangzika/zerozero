syntax = "proto3";

package captain;

message Vector3 {
    double x = 1;
    double y = 2;
    double z = 3;
}

message Quaternion {
    double x = 1;
    double y = 2;
    double z = 3;
    double w = 4;
}

message Pose {
    Vector3 position = 1;
    Quaternion orientation = 2;
}

message Twist {
    Vector3 linear = 1;
    Vector3 angular = 2;
}

message Odometry {
    uint64 timestamp_sec = 1;
    uint32 timestamp_nsec = 2;
    string frame_id = 3;
    string child_frame_id = 4;
    Pose pose = 5;
    Twist twist = 6;
}

message Image {
    uint64 timestamp_sec = 1;
    uint32 timestamp_nsec = 2;
    string frame_id = 3;
    uint32 height = 4;
    uint32 width = 5;
    string encoding = 6;
    uint32 step = 7;
    bytes data = 8;
}

message SensorData {
    Odometry odometry = 1;
    repeated Image images = 2;
}

message PositionControl {
    Vector3 position = 1;
    double yaw = 2;
}

message Command {
    uint32 cmd_type = 1;  // 0: takeoff, 1: land, other values for future use
}
